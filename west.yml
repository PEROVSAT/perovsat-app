manifest:
  remotes:
    - name: zephyrproject-rtos
      url-base: https://github.com/zephyrproject-rtos
    - name: origin
      url-base: https://github.com/PEROVSAT

  projects:
    - name: zephyr
      remote: zephyrproject-rtos
      revision: v4.4.0
      import:
        name-allowlist:
          - cmsis_6
          - cmsis
          - hal_stm32

    - name: amu-driver
      remote: origin
      revision: main
      groups:
        - nda

    - name: eps-driver
      remote: origin
      revision: main
      groups:
        - nda

    - name: eyestar-driver
      remote: origin
      revision: main
      groups:
        - nda

    - name: imu-driver
      remote: origin
      revision: main

  self:
    path: perovsat-app
    west-commands: dbuild/west-commands.yml
