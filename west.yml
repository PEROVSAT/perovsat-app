manifest:
  remotes:
    - name: zephyrproject-rtos
      url-base: https://github.com/zephyrproject-rtos
    - name: origin
      url-base: https://github.com/PEROVSAT

  projects:
    - name: zephyr
      remote: zephyrproject-rtos
      revision: v3.7.0
      import:
        name-allowlist:
          - cmsis
          - hal_stm32

    - name: amu-driver
      remote: origin
      revision: main
      groups:
        - nda

    - name: eps-driver
      remote: origin
      revision: main
      groups:
        - nda

    - name: eyestar-driver
      remote: origin
      revision: main
      groups:
        - nda

  self:
    path: perovsat-app
