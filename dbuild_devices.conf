# dbuild_devices.conf — per-device mode selection
#
# Set each device to 'mock', 'hardware', or 'emulation'.
# This file is committed. Change it to match your current target setup.
# Run `west dbuild -b <board>` to build; run `west dbuild -b <board> --dry-run`
# to see the resolved snippet list without building.
#
# Valid modes: mock, hardware, emulation

IMU=mock
