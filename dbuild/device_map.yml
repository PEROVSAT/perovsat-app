# Device map for dbuild.
#
# Each logical role (e.g. IMU) maps to one west driver project and a set of
# build modes. Modes select a Zephyr snippet (overlay + base Kconfig) and a
# backend Kconfig symbol that dbuild injects as a CMake -D flag.
#
# To add a new device implementation for an existing role:
#   1. Create atomic snippets (e.g. mpu6050-public-mock/, mpu6050-hardware/)
#   2. Point each mode at its snippet and kconfig_backend symbol
#   3. Set board_overlay_required: true for modes that need a board-specific
#      overlay under snippets/<snippet>/boards/<board>.overlay
#
# To add a new logical role:
#   1. Add an entry under `devices:` with the name used in dbuild_devices.conf
#   2. Set west_project to the west manifest project that provides the driver
#   3. Define modes under `modes:`
#
# Valid modes: public-mock, library-mock, simulation, hardware
devices:
  IMU:
    west_project: mpu6050-driver
    modes:
      public-mock:
        snippet: mpu6050-public-mock
        kconfig_backend: CONFIG_PEROVSAT_MPU6050_BACKEND_PUBLIC_MOCK
        board_overlay_required: false
      library-mock:
        snippet: mpu6050-library-mock
        kconfig_backend: CONFIG_PEROVSAT_MPU6050_BACKEND_LIBRARY_MOCK
        board_overlay_required: false
      simulation:
        snippet: mpu6050-simulation
        kconfig_backend: CONFIG_PEROVSAT_MPU6050_BACKEND_SIMULATION
        board_overlay_required: true
      hardware:
        snippet: mpu6050-hardware
        kconfig_backend: CONFIG_PEROVSAT_MPU6050_BACKEND_HARDWARE
        board_overlay_required: true

  MODEM:
    west_project: eyestar-driver
    modes:
      public-mock:
        snippet: eyestar-public-mock
        kconfig_backend: CONFIG_PEROVSAT_EYESTAR_S4_BACKEND_PUBLIC_MOCK
        board_overlay_required: false

  AMU:
    west_project: amu-driver
    modes:
      public-mock:
        snippet: amu-public-mock
        kconfig_backend: CONFIG_PEROVSAT_AMU_BACKEND_PUBLIC_MOCK
        board_overlay_required: false
