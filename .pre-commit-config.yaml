# PerovSat code style hooks (clang-format + basic whitespace).
# Installed automatically by perovsat-app/setup.sh for PEROVSAT west projects.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.1
    hooks:
      - id: clang-format
        types_or: [c, c++]
